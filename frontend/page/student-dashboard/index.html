<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard นักเรียน - Courset</title>
  <link rel="stylesheet" href="../../assets/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a href="../../index.html" class="logo"><span class="logo-icon">📚</span><span class="logo-text">Courset</span></a>
      <nav class="nav-links">
        <a href="index.html" class="nav-item nav-active">Dashboard</a>
        <a href="../my-courses/index.html" class="nav-item">คอร์สของฉัน</a>
        <a href="../courses/index.html" class="nav-item">ค้นหาคอร์ส</a>
      </nav>
      <div class="navbar-right">
        <span class="navbar-username" id="navUsername"></span>
        <button class="btn-auth btn-login" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  </header>
  <section class="page-header">
    <div class="page-header-inner">
      <h1 class="page-title" id="welcomeText">ยินดีต้อนรับ</h1>
      <p class="page-subtitle">ติดตามความคืบหน้าการเรียนของคุณ</p>
    </div>
  </section>
  <div class="dashboard-wrap">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-icon">📘</div><div class="stat-card-info"><span class="stat-card-num" id="statEnrolled">—</span><span class="stat-card-label">คอร์สที่ลงทะเบียน</span></div></div>
      <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-info"><span class="stat-card-num" id="statCompleted">—</span><span class="stat-card-label">บทเรียนที่เรียน / ทั้งหมด</span></div></div>
      <div class="stat-card"><div class="stat-card-icon">🎯</div><div class="stat-card-info"><span class="stat-card-num" id="statProgress">—%</span><span class="stat-card-label">ความคืบหน้าเฉลี่ย</span></div></div>
    </div>
    <div class="dashboard-section">
      <div class="section-header">
        <h2 class="section-title">เรียนต่อจากที่ค้างไว้</h2>
        <a href="../my-courses/index.html" class="view-all-link">ดูทั้งหมด →</a>
      </div>
      <div id="continueGrid" class="courses-grid"><div class="loading-state">กำลังโหลด...</div></div>
    </div>
    <div class="dashboard-section">
      <div class="section-header">
        <h2 class="section-title">คอร์สแนะนำ</h2>
        <a href="../courses/index.html" class="view-all-link">ดูทั้งหมด →</a>
      </div>
      <div id="discoverGrid" class="courses-grid"><div class="loading-state">กำลังโหลด...</div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="index.js"></script>
</body>
</html>
