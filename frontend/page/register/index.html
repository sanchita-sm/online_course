<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>สมัครสมาชิก - MyCourse</title>
  <link rel="stylesheet" href="../../assets/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <a href="../../index.html" class="logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">MyCourse</span>
      </a>
      <h2 class="auth-tagline">เรียนออนไลน์ได้ทุกที่<br/>ทุกเวลา</h2>
      <p class="auth-tagline-sub">เข้าร่วมกับผู้เรียนกว่า 10,000 คน<br/>เลือกคอร์สที่ใช่สำหรับคุณ</p>
      <div class="auth-stats">
        <div class="auth-stat"><span class="auth-stat-num">500+</span><span class="auth-stat-label">คอร์ส</span></div>
        <div class="auth-stat"><span class="auth-stat-num">200+</span><span class="auth-stat-label">อาจารย์</span></div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h1 class="auth-title">สมัครสมาชิก</h1>
        <p class="auth-switch">มีบัญชีแล้ว? <a href="../login/index.html" class="auth-link">เข้าสู่ระบบ</a></p>
        <div class="alert alert-error" id="alertError" style="display:none"></div>
        <div class="alert alert-success" id="alertSuccess" style="display:none"></div>
        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ชื่อ</label>
              <input type="text" id="firstname" class="form-input" placeholder="ชื่อ" required/>
            </div>
            <div class="form-group">
              <label class="form-label">นามสกุล</label>
              <input type="text" id="lastname" class="form-input" placeholder="นามสกุล" required/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">อีเมล</label>
            <input type="email" id="email" class="form-input" placeholder="example@email.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" id="password" class="form-input" placeholder="อย่างน้อย 6 ตัวอักษร" required/>
          </div>
          <div class="form-group">
            <label class="form-label">สถานะ</label>
            <div class="role-select">
              <label class="role-option">
                <input type="radio" name="role" value="student" checked/>
                <div class="role-card">
                  <span class="role-icon">🎓</span>
                  <span class="role-name">นักเรียน / นักศึกษา</span>
                </div>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="teacher"/>
                <div class="role-card">
                  <span class="role-icon">👨‍🏫</span>
                  <span class="role-name">ครู / อาจารย์</span>
                </div>
              </label>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">สมัครสมาชิก</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="index.js"></script>
</body>
</html>
